<!-- About Panel (About Text Editor) -->
<section class="panel panel-about" id="panel-about" style="display: block;">
  <div class="panel-header">
    <h2>About Me Editor</h2>
    <p>Modify the texts of your public "About Me" section.</p>
  </div>

  @if(aboutData) {
  <div class="form-card">
    <h3 class="card-title">About Me Texts</h3>
    <form [formGroup]="myForm" (ngSubmit)="onSubmit()">
      <div class="form-grid">

        <div class="form-group span-2">
          <label for="about-badge">Section Badge (Subtitle Text)</label>
          <input type="text" id="about-badge" formControlName="aboutBadge" class="form-control">
        </div>

        <div class="form-group span-2">
          <label for="about-mainTitle">Main Title</label>
          <input type="text" id="about-mainTitle" formControlName="mainTitle" class="form-control">
          @if (myForm.get('mainTitle')?.invalid && myForm.get('mainTitle')?.touched) {
            <span class="error">This field is required</span>
          }
        </div>

        <!-- About Image Upload Field -->
        <div class="form-group span-2">
          <label for="about-aboutImage" style="font-weight: bold; display: block; margin-bottom: 5px;">Profile Picture / Visual Image</label>
          <div style="display: flex; gap: 15px; align-items: center;">
            <input type="file" id="about-aboutImage" (change)="onImageUpload($event)" accept="image/*" class="form-control" style="flex: 1;">
            @if (aboutData.aboutImage) {
              <img [src]="aboutData.aboutImage" alt="Profile Preview" style="width: 70px; height: 70px; border-radius: 8px; object-fit: cover; border: 1px solid #ccc;">
            }
          </div>
        </div>

        <div class="form-group span-2">
          <label for="about-desc">About Me Description Paragraph</label>
          <textarea id="about-desc" formControlName="aboutDsc" class="form-control" rows="5"></textarea>
        </div>

      </div>

      <div class="form-actions" style="margin-top: 20px;">
        <button type="submit" class="btn btn-primary" [disabled]="myForm.invalid">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          <span>Save Changes</span>
        </button>
      </div>
    </form>
  </div>
  }
</section>
