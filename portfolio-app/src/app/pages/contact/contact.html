<!-- Contact Section -->
 @if(contactData){
<section id="contact" class="section contact-section" aria-labelledby="contact-heading" data-animate-parent>
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle">Get In Touch</span>
      <h2 id="contact-heading" class="section-title">Contact Me</h2>
      <div class="section-divider"></div>
    </div>

    <div class="contact-grid">
      <!-- Contact Details / Info Column -->
      <div class="contact-info-col" data-animate="slide-in-left">
        <h3 class="contact-title">Let's discuss something great.</h3>
        <p class="contact-desc">
{{ contactData.contactDisc }}     
   </p>

        <div class="contact-methods">
          <div class="contact-method-item">
            <div class="method-icon" aria-hidden="true">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </div>
            <div>
              <span class="method-label">Email Me</span>
              <a href="mailto:{{ contactData.emailContact }}" class="method-link">{{ contactData.emailContact }}</a>

            </div>
          </div>

          <div class="contact-method-item">
            <div class="method-icon" aria-hidden="true">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
            <div>
              <span class="method-label">Location</span>
              <span class="method-link text-no-link">{{ contactData.locationContact }}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Styled HTML5 Form -->
      <div class="contact-form-col" data-animate="slide-in-right">
        <form action="#" method="POST" class="contact-form" data-contact-form>
          <div class="form-group-row">
            <div class="form-group">
              <label for="form-name">Name</label>
              <input type="text" id="form-name" name="name" required placeholder="e.g., John Doe" aria-required="true" class="form-input">
            </div>
            <div class="form-group">
              <label for="form-email">Email Address</label>
              <input type="email" id="form-email" name="email" required placeholder="e.g., john@example.com" aria-required="true" class="form-input">
            </div>
          </div>
          <div class="form-group">
            <label for="form-subject">Subject</label>
            <input type="text" id="form-subject" name="subject" required placeholder="Project Inquiry" aria-required="true" class="form-input">
          </div>
          <div class="form-group">
            <label for="form-message">Message</label>
            <textarea id="form-message" name="message" rows="5" required placeholder="Hi Alex, I would love to talk about..." aria-required="true" class="form-input form-textarea"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-submit">
            Send Message
            <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
 }
