<!-- Projects Section -->
<section id="projects" class="section projects-section" aria-labelledby="projects-heading" data-animate-parent>
  <div class="container">
    <div class="section-header">
      <span class="section-subtitle">Portfolio</span>
      <h2 id="projects-heading" class="section-title">Recent Projects</h2>
      <div class="section-divider"></div>
    </div>

    <!-- Project Cards Grid -->
    <div id="project-grid" class="projects-grid">
      
      @if (projectsDoc) {
        <!-- Loop over projectsDoc.projectsList dynamically -->
        @for (project of projectsDoc.projectsList; track project._id) {
        <article class="project-card" data-animate="fade-in" data-scroll>
          <div class="project-img-wrapper">
            @if (project.imageUrl) {
              <img [src]="project.imageUrl" [alt]="project.title" style="width: 100%; height: 200px; object-fit: cover; display: block;">
            } @else {
              <div class="project-placeholder-img">
                <svg viewBox="0 0 100 100" class="placeholder-svg" aria-hidden="true">
                  <defs>
                    <linearGradient id="gradient-proj1" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#7c4dff"></stop>
                      <stop offset="100%" stop-color="#00e5ff"></stop>
                    </linearGradient>
                  </defs>
                  <rect width="100%" height="100%" fill="url(#gradient-proj1)" opacity="0.15"></rect>
                  <circle cx="50" cy="50" r="30" fill="url(#gradient-proj1)" opacity="0.3"></circle>
                  <path d="M30 65 L45 40 L60 55 L75 30" stroke="url(#gradient-proj1)" stroke-width="2" fill="none"></path>
                </svg>
              </div>
            }
            <span class="project-badge">{{ project.badge }}</span>
          </div>
          <div class="project-content">
            <h3 class="project-card-title">{{ project.title }}</h3>
            <p class="project-card-text">
              {{ project.description }}
            </p>
            <div class="project-tech-tags">
              @for (tag of getTagsArray(project.tags); track tag) {
              <span class="tech-tag">{{ tag }}</span>
              }
            </div>
          </div>
        </article>
        }
      }

    </div>
  </div>
</section>
